name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set. Add it to your repo secrets.";
            exit 1;
          fi

          if [ -n "${VERCEL_PROJECT_ID}" ] && [ -n "${VERCEL_ORG_ID}" ]; then
            npx vercel --prod --token "$VERCEL_TOKEN" --confirm --project "$VERCEL_PROJECT_ID" --scope "$VERCEL_ORG_ID"
          elif [ -n "${VERCEL_PROJECT_ID}" ]; then
            npx vercel --prod --token "$VERCEL_TOKEN" --confirm --project "$VERCEL_PROJECT_ID"
          elif [ -n "${VERCEL_ORG_ID}" ]; then
            npx vercel --prod --token "$VERCEL_TOKEN" --confirm --scope "$VERCEL_ORG_ID"
          else
            npx vercel --prod --token "$VERCEL_TOKEN" --confirm
          fi
